services:
  nexum-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nexum:nexum_dev_secret@nexum-db:5432/nexum_db
      JWT_SECRET: nexum_jwt_dev_secret_change_in_prod
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: "*"
      PORTAL_BASE_URL: http://localhost:3000
      # Código OTP fijo para el demo local (sin Twilio): el login funciona con
      # cualquier teléfono usando el código 123456. NO usar en producción real.
      OTP_FALLBACK_CODE: "123456"
    depends_on:
      nexum-db:
        condition: service_healthy
      # Espera a que las migraciones + seed terminen antes de servir, para que
      # la API no consulte tablas que aún no existen.
      nexum-seed:
        condition: service_completed_successfully
    restart: unless-stopped

  # Servicio de un solo uso: aplica migraciones y siembra datos demo (conductor
  # verificado, negocios y viajes compartidos van/carro) y luego termina. Usa
  # una imagen Node con el código montado para tener ts-node disponible (la
  # imagen de producción de nexum-api no lo trae). Así "docker compose up" deja
  # todo listo para el demo sin instalar nada más en tu máquina.
  nexum-seed:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://nexum:nexum_dev_secret@nexum-db:5432/nexum_db
    depends_on:
      nexum-db:
        condition: service_healthy
    command: sh -c "npm install --no-audit --no-fund && npx prisma generate && npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  nexum-db:
    # PostGIS-enabled image: the postgis extension ships preinstalled and the
    # POSTGRES_USER is a superuser, so the `CREATE EXTENSION postgis` in the
    # add_postgis migration applies on first boot. Geo matching needs this.
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: nexum_db
      POSTGRES_USER: nexum
      POSTGRES_PASSWORD: nexum_dev_secret
    # Puerto expuesto al host para poder sembrar datos demo y/o inspeccionar la
    # BD desde tu máquina (npm run db:seed apuntando a localhost:5432).
    ports:
      - "5432:5432"
    volumes:
      - nexum-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexum -d nexum_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  nexum-pg-data:
