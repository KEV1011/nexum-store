services:
  nexum-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nexum:nexum_dev_secret@nexum-db:5432/nexum_db
      JWT_SECRET: nexum_jwt_dev_secret_change_in_prod
      PORT: "3000"
      # Desarrollo local: en development el OTP usa OTP_DEV_CODE (sin Twilio),
      # así puedes entrar con el código fijo. En production el login exigiría
      # Twilio u OTP_FALLBACK_CODE y quedaría cerrado para pruebas locales.
      NODE_ENV: development
      CORS_ORIGIN: "*"
      APP_URL: http://localhost:3000
      # Código fijo de OTP para desarrollo: entra con 123456 en cualquier número.
      OTP_DEV_CODE: "123456"
    depends_on:
      nexum-db:
        condition: service_healthy
    restart: unless-stopped

  nexum-db:
    # PostGIS-enabled image: the postgis extension ships preinstalled and the
    # POSTGRES_USER is a superuser, so the `CREATE EXTENSION postgis` in the
    # add_postgis migration applies on first boot. Geo matching needs this.
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: nexum_db
      POSTGRES_USER: nexum
      POSTGRES_PASSWORD: nexum_dev_secret
    # Puerto expuesto al host para que el backend corriendo con `npm run dev`
    # (fuera de Docker, para hot-reload + seed) pueda conectarse a la BD.
    ports:
      - "5432:5432"
    volumes:
      - nexum-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexum -d nexum_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  nexum-pg-data:
