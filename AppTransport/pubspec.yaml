name: nexum_driver
description: App del conductor - Plataforma MaaS Nexum (Pamplona, Norte de Santander, Colombia)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Maps & Location
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # HTTP client
  dio: ^5.7.0

  # Llamadas a emergencias (tel:123) y enlaces externos
  url_launcher: ^6.3.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI & Fonts
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.0

  # Functional error handling
  dartz: ^0.10.1

  # Real-time communication
  web_socket_channel: ^3.0.1

  # Audio
  audioplayers: ^6.1.0

  # Camera / media
  image_picker: ^1.1.2

  # QR code generation
  qr_flutter: ^4.1.0

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.4.3
  very_good_analysis: ^6.0.0
  mockito: ^5.4.4

# ── Launcher Icons ────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0A7D57"
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A7D57"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"

# ── Native Splash ─────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#0A7D57"
  image: assets/icons/splash_logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#0A7D57"
    image: assets/icons/splash_logo.png
    icon_background_color: "#0A7D57"
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
