buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Solo Firebase; AGP y Kotlin ahora se declaran en settings.gradle
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
