name: nexum_client
description: "Nexum Cliente — app de domicilios para Pamplona, Colombia."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  intl: ^0.20.0
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

# ── Launcher Icons ────────────────────────────────────────────────────────────
# TODO(branding): coloca los assets en AppCliente/assets/icons/ (ver BRANDING.md)
# y genera con:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#00C853"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"

# ── Native Splash ─────────────────────────────────────────────────────────────
# TODO(branding): requiere assets/icons/splash_logo.png. Genera con:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/splash_logo.png
  android: true
  ios: false
  web: false
  android_12:
    color: "#FFFFFF"
    image: assets/icons/splash_logo.png
    icon_background_color: "#00C853"
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
