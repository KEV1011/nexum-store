databases:
  - name: nexum-db
    plan: free
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: nexum-api
    env: docker
    plan: free
    region: oregon
    branch: claude/nexum-postgres-prisma-migration-phpj5q
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexum-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
