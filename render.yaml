services:
  - type: web
    name: nexum-api
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexum-db
          property: connectionString
      - key: INTERCITY_SIMULATE
        value: "false"
      - key: INTERCITY_DUAL_MODEL
        value: "false"
      - key: INTERCITY_REMOVE_CAP
        value: "false"
      # Key de Google Maps (Places/Directions/Geocoding) — se define en el
      # dashboard de Render, nunca en el repo.
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # JSON de la cuenta de servicio de Firebase (texto plano o base64).
      # Sin definir → push en modo mock (solo logs).
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

databases:
  - name: nexum-db
    plan: free
    region: oregon
    databaseName: nexum_db
    user: nexum
