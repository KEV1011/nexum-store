services:
  - type: web
    name: nexum-api
    env: docker
    plan: free
    region: oregon
    branch: claude/driver-app-maas-pamplona-LYIfo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
