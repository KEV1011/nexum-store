name: Build Nexum Cliente APK

on:
  push:
    branches: [main, claude/driver-app-maas-pamplona-LYIfo]
    paths:
      - 'AppCliente/**'
  pull_request:
    branches: [main]
    paths:
      - 'AppCliente/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: AppCliente
        run: flutter pub get

      # ── Inyectar MAPS_API_KEY en local.properties ─────────────────────────
      - name: Write local.properties with Maps API Key
        working-directory: AppCliente/android
        env:
          MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" > local.properties
          echo "MAPS_API_KEY=${MAPS_API_KEY}" >> local.properties

      # ── Firebase (opcional) ───────────────────────────────────────────────
      - name: Decode google-services.json
        working-directory: AppCliente/android/app
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_BASE64" ]; then
            echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > google-services.json
            echo "Firebase config loaded"
          else
            echo "No Firebase secret — skipping Firebase init"
          fi

      # ── Build APK ─────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: AppCliente
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://10.0.2.2:3000' }}
          WS_BASE_URL: ${{ secrets.WS_BASE_URL || 'ws://10.0.2.2:3000' }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexum-cliente-apk
          path: AppCliente/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show build info
        run: |
          echo "✅ Build complete!"
          ls -lh AppCliente/build/app/outputs/flutter-apk/ 2>/dev/null || true
