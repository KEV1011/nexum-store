name: Build Nexum Cliente APK

on:
  push:
    branches: [main]
    paths:
      - 'AppCliente/**'
  pull_request:
    branches: [main]
    paths:
      - 'AppCliente/**'
  workflow_dispatch:   # Permite ejecución manual desde GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      # ── 4. Dependencies ──────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        working-directory: AppCliente
        run: flutter pub get

      # ── 5. Generate launcher icons & splash ──────────────────────────────────
      # AppCliente aún no tiene assets de branding (ver TODO en pubspec):
      # se genera un pin de ubicación provisional con la paleta Nexum.
      - name: Install Python image tools
        run: pip install Pillow

      - name: Generate app icons
        working-directory: AppCliente
        run: |
          python3 - <<'PYEOF'
          from PIL import Image, ImageDraw
          import os

          os.makedirs('assets/icons', exist_ok=True)
          size = 1024
          primary = (0, 200, 83, 255)      # verde Nexum
          white = (255, 255, 255, 240)
          navy = (26, 35, 126, 255)        # azul Nexum

          def draw_pin(draw, ox=0, oy=0, scale=1.0):
              def sx(v): return int(ox + v * scale)
              def sy(v): return int(oy + v * scale)
              # Cabeza circular del pin
              draw.ellipse([sx(262), sy(160), sx(762), sy(660)], fill=white)
              # Punta triangular
              draw.polygon(
                  [(sx(352), sy(560)), (sx(672), sy(560)), (sx(512), sy(880))],
                  fill=white,
              )
              # Centro del pin
              draw.ellipse([sx(412), sy(310), sx(612), sy(510)], fill=navy)

          # Icono completo (fondo verde circular)
          img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          draw = ImageDraw.Draw(img)
          draw.ellipse([0, 0, size - 1, size - 1], fill=primary)
          draw_pin(draw)
          img.save('assets/icons/app_icon.png')

          # Foreground (fondo transparente, para adaptive icon)
          img2 = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          draw_pin(ImageDraw.Draw(img2), ox=int(size*0.125), oy=int(size*0.125), scale=0.75)
          img2.save('assets/icons/app_icon_foreground.png')

          # Splash logo
          img3 = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          d3 = ImageDraw.Draw(img3)
          d3.ellipse([int(size*0.2), int(size*0.2), int(size*0.8), int(size*0.8)], fill=primary)
          draw_pin(d3, ox=int(size*0.25), oy=int(size*0.25), scale=0.5)
          img3.save('assets/icons/splash_logo.png')
          print("Icons generated ✓")
          PYEOF

      - name: Generate launcher icons
        working-directory: AppCliente
        run: dart run flutter_launcher_icons

      - name: Generate native splash
        working-directory: AppCliente
        run: dart run flutter_native_splash:create

      # ── 6. Decode Firebase google-services.json (opcional) ──────────────────
      # App Android propia en Firebase: package com.nexum.nexum_client.
      # Sin el secret, el build sale sin push (la app lo tolera).
      - name: Decode google-services.json
        working-directory: AppCliente/android/app
        env:
          GOOGLE_SERVICES_CLIENTE_BASE64: ${{ secrets.GOOGLE_SERVICES_CLIENTE_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_CLIENTE_BASE64" ]; then
            echo "$GOOGLE_SERVICES_CLIENTE_BASE64" | base64 --decode > google-services.json
            echo "Firebase config loaded"
          else
            echo "No Firebase secret — build will skip Firebase init"
          fi

      # ── 6b. Firma release estable (secrets ANDROID_KEYSTORE_*) ──────────────
      # Misma llave que la app del conductor: la firma no cambia entre builds y
      # las actualizaciones instalan sobre la app existente. Sin los secrets cae
      # a la llave debug (firma efímera: solo pruebas).
      - name: Configure release signing
        working-directory: AppCliente/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Sin ANDROID_KEYSTORE_BASE64 — firma debug (solo pruebas)"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/nexum-release.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=nexum"
            echo "storeFile=nexum-release.jks"
          } > key.properties
          echo "Firma release persistente configurada"

      # ── 7. Build APK ─────────────────────────────────────────────────────────
      # --build-number=run_number: versionCode estrictamente creciente para que
      # Android acepte actualizar sobre la instalación previa.
      - name: Build release APK
        working-directory: AppCliente
        env:
          API_BASE_URL: 'https://nexum-api-trxr.onrender.com'
          WS_BASE_URL: 'wss://nexum-api-trxr.onrender.com'
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=BUILD_TAG=${{ github.run_number }} \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL}

      # ── 8. Build App Bundle (para Play Store) ────────────────────────────────
      - name: Build App Bundle (AAB)
        working-directory: AppCliente
        env:
          API_BASE_URL: 'https://nexum-api-trxr.onrender.com'
          WS_BASE_URL: 'wss://nexum-api-trxr.onrender.com'
        run: |
          flutter build appbundle --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL}

      # ── 9. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexum-cliente-apk
          path: AppCliente/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: nexum-cliente-aab
          path: AppCliente/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 10. Build info ───────────────────────────────────────────────────────
      - name: Show build info
        run: |
          echo "✅ Build complete!"
          ls -lh AppCliente/build/app/outputs/flutter-apk/ 2>/dev/null || true
          ls -lh AppCliente/build/app/outputs/bundle/release/ 2>/dev/null || true
