name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, claude/driver-app-maas-pamplona-LYIfo]
    paths:
      - 'AppTransport/**'
  workflow_dispatch:

permissions:
  contents: write

# Mismo grupo que deploy-web-cliente: serializa los push a gh-pages para
# evitar la carrera "fetch first" cuando ambos deploys corren a la vez.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install Python tools
        run: pip install Pillow

      - name: Generate assets
        working-directory: AppTransport
        run: |
          python3 - <<'PYEOF'
          from PIL import Image, ImageDraw
          import os
          os.makedirs('assets/icons', exist_ok=True)
          size = 1024
          primary = (0, 200, 83, 255)
          white = (255, 255, 255, 240)
          glass = (180, 255, 210, 200)
          wc = (26, 35, 126, 255)
          def car(draw, ox=0, oy=0, sc=1.0):
              def x(v): return int(ox + v*sc)
              def y(v): return int(oy + v*sc)
              wr = int(58*sc)
              draw.rounded_rectangle([x(180),y(380),x(844),y(660)],radius=int(60*sc),fill=white)
              draw.rounded_rectangle([x(270),y(280),x(754),y(460)],radius=int(50*sc),fill=white)
              draw.rounded_rectangle([x(300),y(300),x(724),y(440)],radius=int(30*sc),fill=glass)
              for xo,yo in [(x(180)-wr+10,y(380)+30),(x(844)-3*wr-10,y(380)+30),(x(180)-wr+10,y(660)-30-wr*2),(x(844)-3*wr-10,y(660)-30-wr*2)]:
                  draw.ellipse([xo,yo,xo+wr*2,yo+wr*2],fill=wc)
          img = Image.new('RGBA',(size,size),(0,0,0,0))
          d = ImageDraw.Draw(img); d.ellipse([0,0,size-1,size-1],fill=primary); car(d)
          img.save('assets/icons/app_icon.png')
          img2 = Image.new('RGBA',(size,size),(0,0,0,0)); car(ImageDraw.Draw(img2)); img2.save('assets/icons/app_icon_foreground.png')
          img3 = Image.new('RGBA',(size,size),(0,0,0,0)); car(ImageDraw.Draw(img3),int(size*.225),int(size*.225),.55); img3.save('assets/icons/splash_logo.png')
          print('Icons OK')
          PYEOF

      - name: Get dependencies
        working-directory: AppTransport
        run: flutter pub get

      # --no-tree-shake-icons evita que falten íconos de Cupertino en runtime
      # API_BASE_URL / WS_BASE_URL se inyectan via --dart-define (igual que la
      # app cliente); sin los secrets configurados cae al loopback de emulador.
      - name: Build Flutter Web
        working-directory: AppTransport
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://nexum-api.onrender.com' }}
          WS_BASE_URL: ${{ secrets.WS_BASE_URL || 'wss://nexum-api.onrender.com' }}
        run: |
          flutter build web --release --no-tree-shake-icons \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL}

      # ── Post-build patches ────────────────────────────────────────────────────

      - name: Fix base href for GitHub Pages
        run: |
          sed -i 's|<base href="/">|<base href="/nexum-store/">|g' AppTransport/build/web/index.html
          echo "Base href fixed"

      - name: Force local CanvasKit (evita cargar desde CDN externa)
        run: |
          python3 - <<'EOF'
          import re, sys

          path = 'AppTransport/build/web/flutter_bootstrap.js'
          with open(path, 'r') as f:
              content = f.read()

          # Patch 1: inyectar useLocalCanvasKit en buildConfig
          if '"useLocalCanvasKit"' not in content:
              content = content.replace(
                  '"engineRevision"',
                  '"useLocalCanvasKit":true,"engineRevision"',
                  1
              )
              print('Patch 1 applied: useLocalCanvasKit=true in buildConfig')

          # Patch 2: pasar canvasKitBaseUrl en la llamada al loader
          if 'canvasKitBaseUrl' not in content:
              content = content.replace(
                  '_flutter.loader.load({',
                  '_flutter.loader.load({\n  config: { canvasKitBaseUrl: "canvaskit/" },',
                  1
              )
              print('Patch 2 applied: canvasKitBaseUrl in loader call')

          with open(path, 'w') as f:
              f.write(content)

          print('flutter_bootstrap.js patched successfully')
          EOF

      - name: Remove Flutter service worker (evita cache stale)
        run: |
          # El service worker de Flutter está deprecado y causa problemas de caché.
          # Lo desactivamos reemplazando serviceWorkerSettings por config vacío.
          python3 - <<'EOF'
          import re

          path = 'AppTransport/build/web/flutter_bootstrap.js'
          with open(path, 'r') as f:
              content = f.read()

          # Eliminar serviceWorkerSettings del loader call
          content = re.sub(
              r',?\s*serviceWorkerSettings\s*:\s*\{[^}]*\}',
              '',
              content
          )
          with open(path, 'w') as f:
              f.write(content)
          print('Service worker settings removed from loader')
          EOF

      - name: Inject Google Maps API key
        env:
          GMAPS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$GMAPS_KEY" ]; then
            sed -i "s|__GOOGLE_MAPS_API_KEY__|${GMAPS_KEY}|g" AppTransport/build/web/index.html
            echo "Google Maps API key injected"
          else
            sed -i '/maps.googleapis.com/d' AppTransport/build/web/index.html
            echo "No Maps key — script tag removed"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: AppTransport/build/web
          # keep_files preserva el subdirectorio /cliente/ (app del cliente).
          # No usamos force_orphan para no borrar la otra app en cada deploy.
          keep_files: true
          commit_message: "deploy: ${{ github.sha }}"
