name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit

  driver-app:
    name: App Conductor (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Pub get
        working-directory: AppTransport
        run: flutter pub get

      # Solo errores reales bloquean (infos/warnings del linter no).
      - name: Analyze
        working-directory: AppTransport
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: AppTransport
        run: flutter test

  cliente-app:
    name: App Cliente (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Pub get
        working-directory: AppCliente
        run: flutter pub get

      - name: Analyze
        working-directory: AppCliente
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: AppCliente
        run: flutter test
